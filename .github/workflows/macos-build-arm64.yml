name: Build macOS DMG (ARM64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install gtk4 libadwaita pkg-config adwaita-icon-theme cmake dylibbundler
          
      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPACK_AS_APP=1 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_PREFIX_PATH="/opt/homebrew" \
            -G Ninja
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build project
        run: |
          cmake --build build --config Release

      - name: Package DMG
        run: |
          cd build
          cpack -G DragNDrop
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App-DMG
          path: build/*.dmg
